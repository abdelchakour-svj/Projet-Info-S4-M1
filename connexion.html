<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Île au Fruit</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <main class="login-container">
        <header class="logo-section">
            <a href="index.html">
                <img src="image/lgoo.png" alt="Logo L'Île au Fruit" class="logo">
            </a>
        </header>

        <section class="auth-card">
            <nav class="auth-tabs">
                <button class="tab-btn active">Se connecter</button>
                <a href="inscription.html">
                    <button class="tab-btn">S'inscrire</button>
                </a>
            </nav>

            <form class="auth-form">
                <h2>Bienvenue</h2>
                
                <div class="input-group">
                    <input type="email" placeholder="Adresse e-mail" required>
                </div>

                <div class="input-group">
                    <input type="password" placeholder="Mot de passe" required>
                </div>

                <button type="submit" class="submit-btn">Se connecter</button>
                
                <a href="inscription.html" class="switch-link">Vous n'avez pas de compte ? S'inscrire ici</a>
            </form>
        </section>
    </main>
</body>
</html>
